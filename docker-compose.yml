
version: "3.9"

services:
  concesionario-app:
    container_name: concesionario-expo

    build:
      context: .
      dockerfile: Dockerfile


    image: node:99-alpine

    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - NODE_ENV=development


    stdin_open: true
    tty: true
    restart: unless-stopped