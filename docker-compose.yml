version: "3.9"

services:
  concesionario-app:
    # Nombre del contenedor
    container_name: concesionario-expo

    # Construir desde el Dockerfile en la carpeta actual
    build:
      context: .
      dockerfile: Dockerfile
      
    image: node:99-alpine
    # Mapear puertos del contenedor al host
    ports:
      - "8081:8081"   # Metro Bundler
      - "19000:19000" # Expo DevServer
      - "19001:19001" # Expo DevTools
      - "19002:19002" # Expo Tunnel/QR

    # Montar el código fuente como volumen (cambios en tiempo real)
    volumes:
      - .:/app
      - /app/node_modules  # excluir node_modules del host

    # Variables de entorno necesarias para Expo en Docker
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - NODE_ENV=development

    # Mantener el contenedor corriendo en modo interactivo
    stdin_open: true
    tty: true

    # Reiniciar automáticamente si falla
    restart: unless-stopped
